[line_break]
disabled = true

[character]
disabled = true

[username]
show_always = true
format = '[$user]($style) '

[hostname]
ssh_only = false
ssh_symbol = 'в—ү'
format = '[\($ssh_symbol$hostname\)]($style) '

[directory]
format = '[\[$path\]]($style)[$read_only]($read_only_style) '
truncation_symbol = '.../'

[fill]
symbol = '-'
style = 'bold green'

